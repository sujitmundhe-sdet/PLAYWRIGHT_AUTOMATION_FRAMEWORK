name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test: 
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt
          else python -m pip install pytest playwright pytest-playwright pytest-html pytest-xdist; fi
          python -m playwright install --with-deps

      - name: Run tests
        run: |
          mkdir -p artifacts/reports
          pytest -n auto --maxfail=1 --junitxml=artifacts/reports/report.xml --html=artifacts/reports/report.html --self-contained-html

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            artifacts/**
            reports/**

      - name: Upload junit xml
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-xml
          path: artifacts/reports/report.xml

      - name: Upload full test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-logs
          path: artifacts/reports/